<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>異世界轉生鑑定 — 如果轉生到異世界，你會是什麼職業？</title>
  <meta name="description" content="踏入古老的傳送門，探索你在異世界中的命運。一場關於靈魂深處的職業鑑定，正等待著你。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== SCREEN 1: COVER ===== -->
  <section class="screen active" id="cover-screen">
    <div class="hero__bg" aria-hidden="true"></div>
    <div class="hero__glow" aria-hidden="true"></div>
    <div class="hero__vignette" aria-hidden="true"></div>
    <div class="hero__grain" aria-hidden="true"></div>
    <div class="particles" aria-hidden="true" id="particles-container"></div>

    <div class="hero__content">
      <div class="rune-line" aria-hidden="true"></div>
      <h1 class="hero__title">異世界轉生鑑定</h1>
      <p class="hero__subtitle">如果轉生到異世界，你會是什麼職業？</p>
      <div class="rune-line rune-line--bottom" aria-hidden="true"></div>
      <button class="btn-stone" id="start-quiz-btn" type="button">［ 開始鑑定 ］</button>
    </div>
  </section>

  <!-- ===== SCREEN 2: QUIZ ===== -->
  <section class="screen" id="quiz-screen">
    <div class="hero__grain" aria-hidden="true" style="opacity:0.06"></div>
    <div class="quiz-container quiz-fade-enter">
      <div class="progress-bar">
        <div class="progress-bar__fill" id="progress-fill"></div>
      </div>
      <div class="quiz-header">
        <div class="quiz-step" id="quiz-step"></div>
        <h2 class="quiz-chapter" id="quiz-chapter"></h2>
      </div>

      <!-- 預留的圖片區塊 -->
      <div class="quiz-image-placeholder" id="quiz-image-container">
        <img id="quiz-image" src="" alt="情境插圖">
        <div class="image-placeholder-text">【情境插圖預留區】</div>
      </div>

      <p class="quiz-scenario" id="quiz-scenario"></p>
      <div class="options-list" id="options-list"></div>
      <button class="btn-next" id="next-btn" type="button">下一題 →</button>
    </div>
  </section>

  <!-- ===== SCREEN 3: RESULT ===== -->
  <section class="screen" id="result-screen">
    <div class="hero__grain" aria-hidden="true" style="opacity:0.06"></div>
    <div class="result-container">
      <div class="result-badge">— 靈 魂 軌 跡 鑑 定 結 果 —</div>
      <div class="rune-line" aria-hidden="true" style="margin-bottom:1.5rem"></div>
      <h2 class="result-job" id="result-job"></h2>
      <p class="result-subtitle" id="result-subtitle"></p>
      <p class="result-attrs" id="result-attrs"></p>
      <div class="result-divider"></div>
      <div class="result-description" id="result-desc"></div>
      <button class="btn-retry" id="retry-btn" type="button">再測一次</button>
    </div>
  </section>

  <script src="quiz.js"></script>
</body>
</html>
