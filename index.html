<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>異世界轉生鑑定 — 如果轉生到異世界，你會是什麼職業？</title>
  <meta name="description" content="踏入古老的傳送門，探索你在異世界中的命運。一場關於靈魂深處的職業鑑定，正等待著你。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans TC', sans-serif;
    }

    /* ===== Hero Container ===== */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ===== Background Image ===== */
    .hero__bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: url('hero-bg.png') center center / cover no-repeat;
      /* 備用路徑（若 hero-bg.png 不存在）:
         background: url('file:///C:/Users/tokchou/.gemini/antigravity/brain/605d682d-2f90-44e6-a83c-8b6c13714601/hero_portal_image_1777382098458.png') center center / cover no-repeat;
      */
      filter: brightness(0.55) saturate(0.7);
      animation: slowZoom 30s ease-in-out infinite alternate;
    }

    @keyframes slowZoom {
      0%   { transform: scale(1); }
      100% { transform: scale(1.08); }
    }

    /* ===== Dark Vignette Overlay ===== */
    .hero__vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(10, 18, 22, 0.75) 100%),
        linear-gradient(to bottom,
          rgba(10, 18, 22, 0.5) 0%,
          transparent 25%,
          transparent 60%,
          rgba(10, 18, 22, 0.8) 100%
        );
      pointer-events: none;
    }

    /* ===== Film Grain Overlay ===== */
    .hero__grain {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.12;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
      mix-blend-mode: overlay;
      animation: grainShift 0.5s steps(4) infinite;
    }

    @keyframes grainShift {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-2px, 3px); }
      50%  { transform: translate(3px, -1px); }
      75%  { transform: translate(-1px, -3px); }
      100% { transform: translate(2px, 1px); }
    }

    /* ===== Floating Particles ===== */
    .particles {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: radial-gradient(circle, rgba(120, 220, 232, 0.9), transparent);
      border-radius: 50%;
      animation: floatUp linear infinite;
      box-shadow: 0 0 6px 2px rgba(120, 220, 232, 0.4);
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* ===== Content Layer ===== */
    .hero__content {
      position: relative;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      max-width: 900px;
    }

    /* ===== Decorative Rune Line ===== */
    .rune-line {
      width: 180px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(120, 220, 232, 0.6), transparent);
      margin: 0 auto 1.8rem;
      position: relative;
    }

    .rune-line::before {
      content: '◆';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(120, 220, 232, 0.7);
      font-size: 10px;
      text-shadow: 0 0 8px rgba(120, 220, 232, 0.5);
    }

    /* ===== Title ===== */
    .hero__title {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      color: #e8eff3;
      letter-spacing: 0.15em;
      line-height: 1.3;
      text-shadow:
        0 0 40px rgba(80, 180, 200, 0.35),
        0 0 80px rgba(80, 180, 200, 0.15),
        0 2px 8px rgba(0, 0, 0, 0.6);
      margin-bottom: 0.3em;
      animation: titleFadeIn 2s ease-out forwards;
      opacity: 0;
    }

    @keyframes titleFadeIn {
      0%   { opacity: 0; transform: translateY(20px); filter: blur(6px); }
      100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }

    /* ===== Subtitle ===== */
    .hero__subtitle {
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300;
      font-size: clamp(0.95rem, 2.2vw, 1.35rem);
      color: rgba(200, 215, 222, 0.85);
      letter-spacing: 0.12em;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
      animation: subtitleFadeIn 2s ease-out 0.5s forwards;
      opacity: 0;
    }

    @keyframes subtitleFadeIn {
      0%   { opacity: 0; transform: translateY(14px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ===== Second Rune Line (below subtitle) ===== */
    .rune-line--bottom {
      margin: 0 auto 2.5rem;
    }

    /* ===== Stone CTA Button ===== */
    .btn-stone {
      position: relative;
      display: inline-block;
      padding: 1rem 3rem;
      font-family: 'Noto Serif TC', serif;
      font-weight: 700;
      font-size: clamp(1rem, 2vw, 1.3rem);
      letter-spacing: 0.25em;
      color: #c8d7de;
      background:
        linear-gradient(145deg, #3a4a50, #2a3438, #3a4a50);
      border: 1px solid rgba(120, 220, 232, 0.2);
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -2px 4px rgba(0, 0, 0, 0.3),
        0 4px 16px rgba(0, 0, 0, 0.5),
        0 0 30px rgba(80, 180, 200, 0.08);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      animation: btnFadeIn 2s ease-out 1s forwards;
      opacity: 0;
      overflow: hidden;
    }

    .btn-stone::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 3px,
          rgba(255, 255, 255, 0.015) 3px,
          rgba(255, 255, 255, 0.015) 6px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 4px,
          rgba(0, 0, 0, 0.04) 4px,
          rgba(0, 0, 0, 0.04) 8px
        );
      border-radius: inherit;
      pointer-events: none;
    }

    /* Glowing edge sweep */
    .btn-stone::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(120, 220, 232, 0.12),
        transparent
      );
      transition: left 0.6s ease;
      pointer-events: none;
    }

    .btn-stone:hover {
      color: #e0f4f8;
      border-color: rgba(120, 220, 232, 0.5);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        inset 0 -2px 4px rgba(0, 0, 0, 0.3),
        0 4px 20px rgba(0, 0, 0, 0.5),
        0 0 50px rgba(80, 180, 200, 0.2),
        0 0 100px rgba(80, 180, 200, 0.08);
      transform: translateY(-2px);
      text-shadow: 0 0 12px rgba(120, 220, 232, 0.4);
    }

    .btn-stone:hover::after {
      left: 100%;
    }

    .btn-stone:active {
      transform: translateY(0);
      box-shadow:
        inset 0 2px 4px rgba(0, 0, 0, 0.4),
        0 2px 8px rgba(0, 0, 0, 0.5);
    }

    @keyframes btnFadeIn {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ===== Ambient Glow (behind portal area) ===== */
    .hero__glow {
      position: absolute;
      z-index: 1;
      width: 40vw;
      height: 40vw;
      max-width: 500px;
      max-height: 500px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(80, 180, 200, 0.1) 0%, transparent 70%);
      pointer-events: none;
      animation: glowPulse 5s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 0.8; transform: translate(-50%, -50%) scale(1.15); }
    }

    /* ===== Bottom Decorative Line ===== */
    .hero__footer {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      animation: footerFadeIn 2s ease-out 1.5s forwards;
      opacity: 0;
    }

    @keyframes footerFadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    .scroll-hint {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.7rem;
      color: rgba(200, 215, 222, 0.4);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .scroll-arrow {
      width: 16px;
      height: 16px;
      border-right: 1px solid rgba(120, 220, 232, 0.4);
      border-bottom: 1px solid rgba(120, 220, 232, 0.4);
      transform: rotate(45deg);
      animation: arrowBounce 2s ease-in-out infinite;
    }

    @keyframes arrowBounce {
      0%, 100% { transform: rotate(45deg) translateY(0); opacity: 0.4; }
      50%      { transform: rotate(45deg) translateY(4px); opacity: 0.8; }
    }

    /* ===== Responsive Adjustments ===== */
    @media (max-width: 768px) {
      .hero__content {
        padding: 1.5rem;
      }

      .rune-line {
        width: 120px;
        margin-bottom: 1.2rem;
      }

      .hero__subtitle {
        margin-bottom: 2rem;
      }

      .btn-stone {
        padding: 0.85rem 2.2rem;
      }
    }

    @media (max-width: 480px) {
      .hero__title {
        letter-spacing: 0.08em;
      }

      .hero__subtitle {
        letter-spacing: 0.06em;
      }

      .btn-stone {
        padding: 0.75rem 1.8rem;
        letter-spacing: 0.15em;
      }
    }
  </style>
</head>
<body>
  <section class="hero" id="hero-cover">
    <!-- Background image layer -->
    <div class="hero__bg" aria-hidden="true"></div>

    <!-- Ambient glow -->
    <div class="hero__glow" aria-hidden="true"></div>

    <!-- Vignette overlay -->
    <div class="hero__vignette" aria-hidden="true"></div>

    <!-- Film grain overlay -->
    <div class="hero__grain" aria-hidden="true"></div>

    <!-- Floating soul particles -->
    <div class="particles" aria-hidden="true" id="particles-container"></div>

    <!-- Main content -->
    <div class="hero__content">
      <div class="rune-line" aria-hidden="true"></div>

      <h1 class="hero__title" id="main-title">異世界轉生鑑定</h1>

      <p class="hero__subtitle" id="main-subtitle">
        如果轉生到異世界，你會是什麼職業？
      </p>

      <div class="rune-line rune-line--bottom" aria-hidden="true"></div>

      <button class="btn-stone" id="start-quiz-btn" type="button" aria-label="開始鑑定">
        ［ 開始鑑定 ］
      </button>
    </div>

    <!-- Bottom scroll hint -->
    <div class="hero__footer" aria-hidden="true">
      <span class="scroll-hint">探索命運</span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <script>
    // ===== Generate floating soul particles =====
    (function createParticles() {
      const container = document.getElementById('particles-container');
      const count = 35;

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');

        // Randomize position, size, and timing
        const left = Math.random() * 100;
        const size = 2 + Math.random() * 4;
        const duration = 8 + Math.random() * 12;
        const delay = Math.random() * 15;
        const opacity = 0.3 + Math.random() * 0.7;

        particle.style.left = `${left}%`;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.animationDuration = `${duration}s`;
        particle.style.animationDelay = `${delay}s`;
        particle.style.opacity = opacity;

        container.appendChild(particle);
      }
    })();

    // ===== Button click handler (placeholder for quiz navigation) =====
    document.getElementById('start-quiz-btn').addEventListener('click', function() {
      // Future: Navigate to quiz page
      this.style.pointerEvents = 'none';
      this.textContent = '⟡ 傳送中… ⟡';

      // Simulate a portal transition effect
      document.querySelector('.hero__glow').style.animation = 'none';
      document.querySelector('.hero__glow').style.opacity = '1';
      document.querySelector('.hero__glow').style.transform = 'translate(-50%, -50%) scale(3)';
      document.querySelector('.hero__glow').style.transition = 'all 1.5s ease-in-out';

      document.querySelector('.hero__bg').style.filter = 'brightness(0.2) saturate(0.3)';
      document.querySelector('.hero__bg').style.transition = 'filter 1.5s ease-in-out';

      // Reset after animation (replace with actual navigation)
      setTimeout(() => {
        this.textContent = '［ 開始鑑定 ］';
        this.style.pointerEvents = 'auto';
        document.querySelector('.hero__glow').style.cssText = '';
        document.querySelector('.hero__bg').style.cssText = '';
      }, 2500);
    });
  </script>
</body>
</html>
